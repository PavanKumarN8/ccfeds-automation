name: 📅 Daily Playwright Tests

on:
  schedule:
    - cron: '30 0 * * *'  # 06:00 IST
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (ALL tests)
        id: run-tests
        run: |
          npx playwright test \
            --config=./configs/cc.config.js \
            --project=cc-live-chrome \
            --workers=2 \
            --reporter=json > playwright-results.json || echo "{}" > playwright-results.json
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: playwright-html-report-${{ matrix.os }}
          path: playwright-report

      - name: Parse Results Summary
        id: summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');

          let passed = 0, failed = 0, skipped = 0;

          try {
            if (!fs.existsSync('playwright-results.json')) {
              console.log('Results file not found');
            } else {
              const raw = fs.readFileSync('playwright-results.json', 'utf-8').trim();

              if (raw) {
                const results = JSON.parse(raw);
                const suites = Array.isArray(results.suites) ? results.suites : [];
                const allSpecs = suites.flatMap(s => Array.isArray(s.specs) ? s.specs : []);

                passed = allSpecs.filter(s => s.status === 'passed').length;
                failed = allSpecs.filter(s => s.status === 'failed').length;
                skipped = allSpecs.filter(s => s.status === 'skipped').length;
              } else {
                console.log('Results file is empty');
              }
            }
          } catch (err) {
            console.log('Error parsing results:', err.message);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `passed=${passed}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `failed=${failed}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `skipped=${skipped}\n`);
          "

      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.summary.outputs.failed != '0' && '#ff0000' || '#36a64f' }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "🤖 Daily Playwright E2E Report"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                        { "type": "mrkdwn", "text": "*OS:*\n${{ matrix.os }}" },
                        { "type": "mrkdwn", "text": "*✔️ Passed:*\n${{ steps.summary.outputs.passed }}" },
                        { "type": "mrkdwn", "text": "*❌ Failed:*\n${{ steps.summary.outputs.failed }}" },
                        { "type": "mrkdwn", "text": "*⏭️ Skipped:*\n${{ steps.summary.outputs.skipped }}" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "📦 *<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Report>*"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
